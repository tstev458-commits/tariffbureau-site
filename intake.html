
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start Your Tariff and Compliance Review | Tariff Bureau</title>
 
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.tariffbureau.com/intake.html">
  <link rel="icon" href="/favicon.ico">
<meta name="description" content="Submit your project details to begin a structured review of tariff exposure, country-of-origin considerations, and import compliance risk.">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f9fafb;
      color: #111;
    }

    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      background: #fff;
      border-radius: 8px;
    }

    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 100px;
    }

    .full {
      grid-column: span 2;
    }

    button {
      grid-column: span 2;
      padding: 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <main>
    <h1>Start Your Tariff and Compliance Review</h1>
<p>
  Submit your project details to begin a structured review of tariff exposure,
  country-of-origin considerations, and import compliance factors.
</p>
    
<form action="https://formspree.io/f/xvzdgzyo" method="POST">
  <input type="hidden" name="_subject" value="Tariff Bureau Review Request">
  <input type="hidden" name="_redirect" value="https://www.tariffbureau.com/thank-you.html">
  <input type="text" name="_gotcha" style="display:none">
  
      
      <input type="hidden" name="_redirect" value="https://www.tariffbureau.com/thank-you.html">
      <input type="text" name="_gotcha" style="display:none">

      <div>
        <label>Name</label>
        <input type="text" name="name" required>
      </div>

      <div>
        <label>Company</label>
        <input type="text" name="company">
      </div>

      <div>
        <label>Email</label>
        <input type="email" name="_replyto" required>
      </div>

      <div>
        <label>Phone</label>
        <input type="tel" name="phone">
      </div>

      <div class="full">
        <label>Product Description</label>
        <textarea name="product_description" required></textarea>
      </div>

      <div>
        <label>Country of Origin</label>
        <input type="text" name="country_of_origin" required>
      </div>

      <div>
        <label>Target Markets</label>
        <input type="text" name="target_markets">
      </div>

      <div>
        <label>Estimated Volume</label>
        <input type="text" name="estimated_volume">
      </div>

      <div>
        <label>Urgency</label>
        <select name="urgency">
          <option value="">Select one</option>
          <option value="standard">Standard</option>
          <option value="urgent">Urgent</option>
          <option value="not_sure">Not sure</option>
        </select>
      </div>

      <div class="full">
        <label>Additional Details</label>
        <textarea name="additional_details"></textarea>
      </div>

      <div class="full">
        <label>
          <input type="checkbox" name="consent" required>
          I understand this submission does not establish a client relationship until accepted in writing.
        </label>
      </div>
<button type="submit">Submit for Review</button>
      
    </form>

    <p><a href="/index.html">Home</a></p>
  </main>
</body>
</html>
